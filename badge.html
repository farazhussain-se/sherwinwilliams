<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My QR Badge – Sherwin-Williams</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * { box-sizing: border-box; }
        html { overflow: hidden; height: auto; }
        body {
            margin: 0;
            padding: 10px;
            overflow: hidden;
            height: auto;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #root { overflow: hidden; height: auto; }

        @keyframes pulse-ring {
            0%   { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74,222,128,0.7); }
            70%  { transform: scale(1);    box-shadow: 0 0 0 8px rgba(74,222,128,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74,222,128,0); }
        }
        .pulse { border-radius: 50%; animation: pulse-ring 2s infinite; }

        /* Shimmer animation for the scan button */
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .scan-btn {
            background: linear-gradient(90deg, #003087 25%, #0055cc 50%, #003087 75%);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: 800;
            border-radius: 12px;
            width: 100%;
            padding: 14px;
            font-size: 14px;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .scan-btn:active { opacity: 0.85; transform: scale(0.98); }

        .tab-btn {
            flex: 1;
            padding: 9px 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.15s;
        }
    </style>
</head>
<body>
    <div id="root">Loading badge...</div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ── HARDCODED EMPLOYEE (Sherwin-Williams Plant) ──
        const EMPLOYEE = {
            swUserId:    "SW-PLT-30412",
            firstName:   "Jordan",
            lastName:    "Rivera",
            title:       "Paint Production Technician II",
            department:  "Manufacturing – Batch Production",
            plant:       "Sherwin-Williams Cleveland Plant",
            location:    "Cleveland, OH",
            shift:       "Day | 06:00 – 14:30",
            accessLevel: "PRODUCTION FLOOR",
            ppeStatus:   "Compliant",
            expires:     "2026-12-31",
            // Workflows this badge supports
            workflows: [
                { icon: "🕐", label: "Time Clock",     sub: "Dayforce punch-in/out",    action: "timeclock"  },
                { icon: "🚪", label: "Site Access",     sub: "Gate & floor entry",        action: "access"     },
                { icon: "📋", label: "Training Log",    sub: "Record completion",         action: "training"   }
            ],
            // Real SW plant certifications (OSHA VPP, ISO 45001, hazmat)
            certifications: [
                { label: "OSHA VPP Star",      expires: "2027-06-01", status: "active"   },
                { label: "ISO 45001",           expires: "2026-09-15", status: "active"   },
                { label: "Hazmat Handler",      expires: "2026-04-10", status: "expiring" },
                { label: "Forklift Operator",   expires: "2027-01-20", status: "active"   },
                { label: "Flammables Safety",   expires: "2026-12-01", status: "active"   },
                { label: "GHS/SDS Compliance",  expires: "2026-08-01", status: "active"   }
            ]
        };

        // ── SW Brand Colors ──
        const SW = {
            red:      '#C41230',
            darkRed:  '#8B0D22',
            blue:     '#003087',
            gray:     '#F5F5F5',
            darkGray: '#1A1A1A'
        };

        const SWBadge = () => {
            const qrRef       = useRef(null);
            const [qrDone, setQrDone]       = useState(false);
            const [timeString, setTimeString] = useState('');
            const [tab, setTab]               = useState('badge');
            const [scanTarget, setScanTarget] = useState('timeclock');

            // Live clock
            useEffect(() => {
                const tick = () => setTimeString(
                    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                );
                tick();
                const t = setInterval(tick, 1000);
                return () => clearInterval(t);
            }, []);

            // Build QR payload based on selected workflow
            const qrPayload = `SW-BADGE|ID:${EMPLOYEE.swUserId}|EMP:${EMPLOYEE.firstName}+${EMPLOYEE.lastName}|WORKFLOW:${scanTarget.toUpperCase()}|PLANT:CLV|TS:${Date.now()}`;

            // Generate QR code
            useEffect(() => {
                if (qrRef.current) {
                    qrRef.current.innerHTML = '';
                    setQrDone(false);
                    try {
                        new QRCode(qrRef.current, {
                            text: qrPayload,
                            width: 180,
                            height: 180,
                            colorDark:  SW.darkGray,
                            colorLight: '#FFFFFF',
                            correctLevel: QRCode.CorrectLevel.H
                        });
                        setQrDone(true);
                    } catch(e) {
                        qrRef.current.innerHTML = '<p style="color:red;font-size:10px">QR Error</p>';
                    }
                }
            }, [scanTarget]);

            // ── Open in external browser for native QR scanner / Dayforce app flow ──
            const openInBrowser = () => {
                const urls = {
                    timeclock: `https://mysherwin.sherwin.com/timeclock?uid=${EMPLOYEE.swUserId}`,
                    access:    `https://mysherwin.sherwin.com/access?uid=${EMPLOYEE.swUserId}`,
                    training:  `https://mysherwin.sherwin.com/training?uid=${EMPLOYEE.swUserId}`
                };
                window.open(urls[scanTarget], '_blank', 'noreferrer');
            };

            const activeWorkflow = EMPLOYEE.workflows.find(w => w.action === scanTarget);

            return (
                <div style={{ maxWidth: '360px', margin: '0 auto' }}>
                    <div style={{
                        background: 'white', borderRadius: '20px', overflow: 'hidden',
                        border: '1px solid #e5e7eb', boxShadow: '0 6px 24px rgba(0,0,0,0.12)'
                    }}>

                        {/* ── Security Header ── */}
                        <div style={{ background: SW.darkGray, padding: '8px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span style={{ color: 'white', fontSize: '11px', fontWeight: '700', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                <span className="pulse" style={{ width: '9px', height: '9px', background: '#4ade80', display: 'inline-block' }}></span>
                                BADGE ACTIVE
                            </span>
                            <span style={{ color: '#9ca3af', fontSize: '10px', fontFamily: 'monospace' }}>{timeString}</span>
                        </div>

                        {/* ── SW Red Brand Bar ── */}
                        <div style={{ background: SW.red, padding: '10px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div style={{ display: 'flex', flexDirection: 'column' }}>
                                <span style={{ color: 'white', fontSize: '13px', fontWeight: '900', letterSpacing: '0.08em' }}>
                                    SHERWIN-WILLIAMS
                                </span>
                                <span style={{ color: 'rgba(255,255,255,0.75)', fontSize: '9px', fontWeight: '600', letterSpacing: '0.1em' }}>
                                    {EMPLOYEE.plant}
                                </span>
                            </div>
                            <div style={{ background: 'rgba(255,255,255,0.15)', borderRadius: '6px', padding: '3px 8px' }}>
                                <span style={{ color: 'white', fontSize: '9px', fontWeight: '800', letterSpacing: '0.08em' }}>
                                    {EMPLOYEE.accessLevel}
                                </span>
                            </div>
                        </div>

                        {/* ── Tabs ── */}
                        <div style={{ display: 'flex', borderBottom: '1px solid #f3f4f6' }}>
                            {[
                                { key: 'badge', label: '🪪 My Badge' },
                                { key: 'certs', label: '📋 Certs'    }
                            ].map(t => (
                                <button key={t.key} className="tab-btn"
                                    onClick={() => setTab(t.key)}
                                    style={{
                                        color: tab === t.key ? SW.red : '#6b7280',
                                        borderBottom: tab === t.key ? `2px solid ${SW.red}` : '2px solid transparent'
                                    }}>
                                    {t.label}
                                </button>
                            ))}
                        </div>

                        {/* ══════════════════════════
                            TAB 1: BADGE + QR
                        ══════════════════════════ */}
                        {tab === 'badge' && (
                            <div>
                                {/* Name block */}
                                <div style={{ padding: '14px 16px 10px', borderBottom: '1px solid #f9fafb', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                    <div>
                                        <p style={{ margin: '0 0 2px 0', fontSize: '20px', fontWeight: '900', color: '#111827', lineHeight: 1.1 }}>
                                            {EMPLOYEE.firstName}<br/>{EMPLOYEE.lastName}
                                        </p>
                                        <p style={{ margin: '4px 0 2px 0', fontSize: '10px', fontWeight: '700', color: SW.red, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                                            {EMPLOYEE.title}
                                        </p>
                                        <p style={{ margin: '0 0 2px 0', fontSize: '9px', color: '#6b7280' }}>{EMPLOYEE.department}</p>
                                        <p style={{ margin: '0 0 6px 0', fontSize: '9px', color: '#9ca3af' }}>📍 {EMPLOYEE.location}</p>
                                        <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                                            <Pill color="#dcfce7" text={`✓ PPE ${EMPLOYEE.ppeStatus}`} textColor="#166534" />
                                            <Pill color="#dbeafe" text={`⏰ ${EMPLOYEE.shift}`} textColor="#1e40af" />
                                        </div>
                                    </div>
                                    <div style={{ background: SW.red, color: 'white', borderRadius: '10px', padding: '6px 10px', textAlign: 'center', flexShrink: 0, marginLeft: '10px' }}>
                                        <p style={{ margin: 0, fontSize: '8px', fontWeight: '700', letterSpacing: '0.05em' }}>SW USER ID</p>
                                        <p style={{ margin: '2px 0 0 0', fontSize: '11px', fontFamily: 'monospace', fontWeight: '900' }}>{EMPLOYEE.swUserId}</p>
                                    </div>
                                </div>

                                {/* Workflow Selector */}
                                <div style={{ padding: '12px 16px 8px' }}>
                                    <p style={{ margin: '0 0 8px 0', fontSize: '10px', fontWeight: '700', color: '#374151', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                                        Select Workflow to Scan
                                    </p>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '6px' }}>
                                        {EMPLOYEE.workflows.map((wf) => (
                                            <button key={wf.action}
                                                onClick={() => setScanTarget(wf.action)}
                                                style={{
                                                    border: `2px solid ${scanTarget === wf.action ? SW.red : '#e5e7eb'}`,
                                                    background: scanTarget === wf.action ? '#fff1f2' : 'white',
                                                    borderRadius: '10px',
                                                    padding: '8px 4px',
                                                    cursor: 'pointer',
                                                    textAlign: 'center',
                                                    transition: 'all 0.15s'
                                                }}>
                                                <p style={{ margin: '0 0 3px 0', fontSize: '18px' }}>{wf.icon}</p>
                                                <p style={{ margin: '0 0 2px 0', fontSize: '9px', fontWeight: '800', color: scanTarget === wf.action ? SW.red : '#374151' }}>{wf.label}</p>
                                                <p style={{ margin: 0, fontSize: '8px', color: '#9ca3af', lineHeight: 1.3 }}>{wf.sub}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* QR Code */}
                                <div style={{ padding: '8px 16px 12px', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                                    <div style={{
                                        padding: '10px', background: 'white',
                                        border: `3px solid ${SW.red}`, borderRadius: '16px',
                                        boxShadow: '0 2px 12px rgba(196,18,48,0.15)'
                                    }}>
                                        <div ref={qrRef}></div>
                                    </div>
                                    <p style={{ margin: '6px 0 2px 0', fontSize: '10px', fontWeight: '700', color: SW.darkGray }}>
                                        {activeWorkflow?.icon} Scan for: <span style={{ color: SW.red }}>{activeWorkflow?.label}</span>
                                    </p>
                                    <p style={{ margin: '0 0 10px 0', fontSize: '9px', color: '#9ca3af' }}>{activeWorkflow?.sub}</p>

                                    {/* Open in External Browser Button */}
                                    <button className="scan-btn" onClick={openInBrowser}>
                                        <span style={{ fontSize: '16px' }}>📱</span>
                                        Open in Scanner App
                                        <span style={{ fontSize: '12px', opacity: 0.8 }}>↗</span>
                                    </button>
                                    <p style={{ margin: '6px 0 0 0', fontSize: '9px', color: '#9ca3af', textAlign: 'center' }}>
                                        Opens MySherwin in your mobile browser for full app flow
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* ══════════════════════════
                            TAB 2: CERTIFICATIONS
                        ══════════════════════════ */}
                        {tab === 'certs' && (
                            <div style={{ padding: '12px 16px 16px' }}>
                                <p style={{ margin: '0 0 10px 0', fontSize: '10px', fontWeight: '700', color: '#374151', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                                    Active Certifications
                                </p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                    {EMPLOYEE.certifications.map((c, i) => {
                                        const cfg = {
                                            active:   { bg: '#f0fdf4', border: '#bbf7d0', text: '#166534', badge: '✓ Active',   badgeColor: '#166534'  },
                                            expiring: { bg: '#fffbeb', border: '#fde68a', text: '#92400e', badge: '⚠ Expiring', badgeColor: '#92400e'  },
                                            expired:  { bg: '#fef2f2', border: '#fecaca', text: '#991b1b', badge: '✗ Expired',  badgeColor: '#991b1b'  }
                                        }[c.status];
                                        return (
                                            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '9px 12px', borderRadius: '10px', background: cfg.bg, border: `1px solid ${cfg.border}` }}>
                                                <div>
                                                    <p style={{ margin: '0 0 2px 0', fontSize: '11px', fontWeight: '700', color: '#111827' }}>{c.label}</p>
                                                    <p style={{ margin: 0, fontSize: '9px', color: '#6b7280' }}>Exp: {c.expires}</p>
                                                </div>
                                                <span style={{ fontSize: '9px', fontWeight: '800', color: cfg.badgeColor, textTransform: 'uppercase', letterSpacing: '0.05em', whiteSpace: 'nowrap' }}>
                                                    {cfg.badge}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div style={{ marginTop: '12px', padding: '10px 12px', borderRadius: '10px', background: '#f0f9ff', border: '1px solid #bae6fd' }}>
                                    <p style={{ margin: '0 0 2px 0', fontSize: '10px', fontWeight: '700', color: '#0369a1' }}>
                                        📊 Managed via OSHA VPP + ISO 45001 EHSMS
                                    </p>
                                    <p style={{ margin: 0, fontSize: '9px', color: '#0284c7', lineHeight: 1.4 }}>
                                        Sherwin-Williams tracks all plant certifications through its Environmental Health & Safety Management System. Renewals trigger automatically in MySherwin.
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* ── Footer ── */}
                        <div style={{ background: SW.darkGray, padding: '7px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span style={{ color: '#6b7280', fontSize: '9px' }}>Expires: {EMPLOYEE.expires}</span>
                            <span style={{ color: '#6b7280', fontSize: '9px' }}>Powered by MySherwin</span>
                        </div>

                    </div>

                    <p style={{ textAlign: 'center', fontSize: '10px', color: '#9ca3af', marginTop: '8px', marginBottom: '4px' }}>
                        SW Digital Badge • Do not share or screenshot
                    </p>
                </div>
            );
        };

        // ── Shared Sub-component ──
        const Pill = ({ color, text, textColor }) => (
            <span style={{ background: color, color: textColor, fontSize: '8px', fontWeight: '700', padding: '2px 7px', borderRadius: '99px' }}>
                {text}
            </span>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<SWBadge />);
    </script>
</body>
</html>
