<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ServiceNow IT Tickets – Sherwin-Williams</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: transparent; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; padding: 10px; }

        :root {
            --sw-red:  #C8102E;
            --sn-blue: #0071CE;
            --navy:    #1a1a2e;
            --border:  #E2E8F0;
            --bg:      #F8FAFC;
            --text:    #1E293B;
            --subtle:  #64748B;
            --muted:   #94A3B8;
        }

        .widget {
            width: 100%; max-width: 380px; margin: 0 auto;
            background: white; border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 16px rgba(0,0,0,0.10);
            overflow: hidden;
        }

        /* Header */
        .wg-head {
            background: var(--navy); padding: 11px 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .wg-head-left { display: flex; align-items: center; gap: 8px; }
        .sn-chip { background: var(--sn-blue); color: white; font-size: 8px; font-weight: 900; letter-spacing: 0.07em; padding: 2px 6px; border-radius: 3px; }
        .wg-title { color: white; font-size: 13px; font-weight: 700; }
        .wg-head-right { display: flex; align-items: center; gap: 8px; }

        /* Toggle */
        .toggle-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
        .toggle-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.55); min-width: 26px; text-align: right; }
        .toggle-track { width: 36px; height: 20px; border-radius: 99px; background: #334155; border: 1px solid #475569; position: relative; transition: background 0.2s; cursor: pointer; }
        .toggle-track.on { background: var(--sn-blue); border-color: var(--sn-blue); }
        .toggle-thumb { width: 14px; height: 14px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 3px; transition: left 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
        .toggle-track.on .toggle-thumb { left: 19px; }

        .new-btn { background: var(--sw-red); border: none; border-radius: 6px; color: white; font-size: 10px; font-weight: 800; padding: 6px 11px; cursor: pointer; min-height: 30px; }
        .new-btn:active { opacity: 0.85; }

        /* Filter bar */
        .filter-bar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; gap: 6px; align-items: center; }
        .search-wrap { flex: 1; position: relative; }
        .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; pointer-events: none; }
        .search-input { width: 100%; padding: 6px 8px 6px 26px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; color: var(--text); background: white; outline: none; font-family: inherit; }
        .search-input:focus { border-color: var(--sn-blue); }

        .filter-select { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 10px; font-weight: 600; color: var(--subtle); background: white; cursor: pointer; outline: none; font-family: inherit; appearance: none; -webkit-appearance: none; }
        .filter-select:focus { border-color: var(--sn-blue); }

        /* Tabs */
        .tab-row { display: flex; border-bottom: 2px solid var(--border); background: white; padding: 0 12px; }
        .tab { padding: 9px 10px; font-size: 11px; font-weight: 700; color: var(--subtle); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; display: flex; align-items: center; gap: 5px; }
        .tab.active { color: var(--sn-blue); border-bottom-color: var(--sn-blue); }
        .tab-count { font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 99px; background: #e2e8f0; color: var(--subtle); }
        .tab.active .tab-count { background: #dbeafe; color: var(--sn-blue); }

        /* Ticket rows */
        .ticket-list { background: var(--bg); }
        .ticket-row { background: white; border-bottom: 1px solid var(--border); padding: 11px 14px 10px 17px; cursor: pointer; position: relative; transition: transform 0.15s, box-shadow 0.15s; }
        .ticket-row:last-child { border-bottom: none; }
        .ticket-row:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,0.08); z-index: 1; }

        /* Priority stripe */
        .ticket-row::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
        .pri-1::before, .pri-2::before { background: #DC3545; }
        .pri-3::before { background: #FFC107; }
        .pri-4::before, .pri-5::before { background: #28A745; }

        .t-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 4px; }
        .t-top-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

        .t-num { font-size: 10px; font-weight: 800; color: var(--sn-blue); font-family: 'Courier New', monospace; }

        .t-type { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
        .type-incident { background: #fee2e2; color: #991b1b; }
        .type-request  { background: #dbeafe; color: #1e40af; }
        .type-change   { background: #f3e8ff; color: #6b21a8; }

        .t-pri { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; }
        .p1, .p2 { background: #fee2e2; color: #991b1b; border: 1px solid rgba(220,53,69,0.2); }
        .p3 { background: #fef3c7; color: #92400e; border: 1px solid rgba(255,193,7,0.2); }
        .p4, .p5 { background: #dcfce7; color: #166534; border: 1px solid rgba(40,167,69,0.2); }

        .t-status { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
        .st-open       { background: #dbeafe; color: #1e40af; }
        .st-inprogress { background: #d1fae5; color: #065f46; }
        .st-onhold     { background: #fef3c7; color: #92400e; }
        .st-new        { background: #ede9fe; color: #5b21b6; }
        .st-resolved   { background: #e2e8f0; color: #475569; }

        .t-subject { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .t-meta { display: flex; justify-content: space-between; align-items: center; }
        .t-updated { font-size: 9px; color: var(--muted); }
        .t-sys { font-size: 9px; font-weight: 600; color: var(--subtle); background: var(--bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; }

        /* Empty */
        .empty { padding: 28px 16px; text-align: center; background: white; }
        .empty p { font-size: 12px; color: var(--subtle); line-height: 1.6; margin-top: 6px; }

        /* Footer */
        .wg-foot { background: #f1f5f9; border-top: 1px solid var(--border); padding: 7px 14px; display: flex; justify-content: space-between; align-items: center; }
        .wg-foot span { font-size: 9px; color: var(--muted); }
        .wg-foot a { font-size: 9px; color: var(--sn-blue); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
<div class="widget">

    <!-- Header -->
    <div class="wg-head">
        <div class="wg-head-left">
            <span class="sn-chip">ServiceNow</span>
            <span class="wg-title">Your IT Tickets</span>
        </div>
        <div class="wg-head-right">
            <div class="toggle-wrap" onclick="toggleMine()">
                <span class="toggle-lbl" id="toggle-lbl">Mine</span>
                <div class="toggle-track on" id="toggle-track">
                    <div class="toggle-thumb"></div>
                </div>
            </div>
            <button class="new-btn">+ New</button>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="search-input" placeholder="Search tickets..." oninput="render()">
        </div>
        <select class="filter-select" id="type-filter" onchange="render()">
            <option value="all">All Types</option>
            <option value="incident">Incidents</option>
            <option value="request">Requests</option>
            <option value="change">Changes</option>
        </select>
        <select class="filter-select" id="sort-filter" onchange="render()">
            <option value="newest">Newest</option>
            <option value="priority">Priority</option>
        </select>
    </div>

    <!-- Tabs -->
    <div class="tab-row">
        <button class="tab active" id="tab-open"     onclick="switchTab('open')">Open <span class="tab-count" id="cnt-open">0</span></button>
        <button class="tab"        id="tab-resolved" onclick="switchTab('resolved')">Resolved <span class="tab-count" id="cnt-resolved">0</span></button>
        <button class="tab"        id="tab-all"      onclick="switchTab('all')">All <span class="tab-count" id="cnt-all">0</span></button>
    </div>

    <!-- Ticket list -->
    <div class="ticket-list" id="ticket-list"></div>

    <!-- Footer -->
    <div class="wg-foot">
        <span id="sync-label">Synced just now</span>
        <a href="#">View all in ServiceNow ↗</a>
    </div>
</div>

<script>
    var TICKETS = [
        {
            id: "INC0012304", type: "incident", typeLabel: "Incident", typeClass: "type-incident",
            pri: 1, priLabel: "P1 · Critical",   priClass: "p1",
            status: "In Progress", statusClass: "st-inprogress",
            subject: "Oracle EBS login failure – Cleveland #247",
            system: "Oracle EBS", updated: "Today 06:14 AM", resolved: false
        },
        {
            id: "INC0009909", type: "incident", typeLabel: "Incident", typeClass: "type-incident",
            pri: 3, priLabel: "P3 · Moderate",   priClass: "p3",
            status: "On Hold", statusClass: "st-onhold",
            subject: "Unable to access shared drive \\\\SW-CLV-FS01",
            system: "File Services", updated: "Yesterday 5:57 PM", resolved: false
        },
        {
            id: "REQ0047821", type: "request", typeLabel: "Request", typeClass: "type-request",
            pri: 4, priLabel: "P4 · Low",         priClass: "p4",
            status: "Open", statusClass: "st-open",
            subject: "Remove hotfix KB5031356 from store PC register 2",
            system: "Dayforce", updated: "10/15/25 5:57 AM", resolved: false
        },
        {
            id: "INC0000059", type: "incident", typeLabel: "Incident", typeClass: "type-incident",
            pri: 3, priLabel: "P3 · Moderate",   priClass: "p3",
            status: "In Progress", statusClass: "st-inprogress",
            subject: "Unable to access team scheduling in Dayforce",
            system: "Dayforce", updated: "10/15/25 5:57 AM", resolved: false
        },
        {
            id: "CHG0003312", type: "change", typeLabel: "Change", typeClass: "type-change",
            pri: 5, priLabel: "P5 · Planning",    priClass: "p5",
            status: "New", statusClass: "st-new",
            subject: "ColorSnap® kiosk firmware upgrade – District batch 4",
            system: "ColorSnap", updated: "10/12/25 9:00 AM", resolved: false
        },
        {
            id: "INC0008801", type: "incident", typeLabel: "Incident", typeClass: "type-incident",
            pri: 2, priLabel: "P2 · High",        priClass: "p2",
            status: "Resolved", statusClass: "st-resolved",
            subject: "POS terminal frozen – store cannot process transactions",
            system: "Store POS", updated: "10/10/25 11:42 AM", resolved: true
        }
    ];

    var activeTab = 'open';
    var mineOnly  = true;

    function toggleMine() {
        mineOnly = !mineOnly;
        var track = document.getElementById('toggle-track');
        var lbl   = document.getElementById('toggle-lbl');
        if (mineOnly) { track.classList.add('on'); lbl.textContent = 'Mine'; }
        else          { track.classList.remove('on'); lbl.textContent = 'All'; }
        render();
    }

    function switchTab(tab) {
        activeTab = tab;
        ['open','resolved','all'].forEach(function(t) {
            document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        });
        render();
    }

    function render() {
        var search    = document.getElementById('search-input').value.toLowerCase();
        var typeF     = document.getElementById('type-filter').value;
        var sortF     = document.getElementById('sort-filter').value;

        var filtered = TICKETS.filter(function(t) {
            var matchSearch = !search || t.subject.toLowerCase().includes(search) || t.id.toLowerCase().includes(search);
            var matchType   = typeF === 'all' || t.type === typeF;
            var matchTab    = activeTab === 'all' ? true : activeTab === 'resolved' ? t.resolved : !t.resolved;
            return matchSearch && matchType && matchTab;
        });

        if (sortF === 'priority') {
            filtered.sort(function(a,b) { return a.pri - b.pri; });
        }

        // Update counts
        document.getElementById('cnt-open').textContent     = TICKETS.filter(function(t){return !t.resolved;}).length;
        document.getElementById('cnt-resolved').textContent = TICKETS.filter(function(t){return t.resolved;}).length;
        document.getElementById('cnt-all').textContent      = TICKETS.length;

        var list = document.getElementById('ticket-list');

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty"><p style="font-size:28px">✅</p><p>No tickets match.<br>All clear!</p></div>';
            return;
        }

        list.innerHTML = filtered.map(function(t) {
            return '<div class="ticket-row pri-' + t.pri + '">' +
                '<div class="t-top">' +
                    '<div class="t-top-left">' +
                        '<span class="t-num">' + t.id + '</span>' +
                        '<span class="t-type ' + t.typeClass + '">' + t.typeLabel + '</span>' +
                        '<span class="t-pri ' + t.priClass + '">' + t.priLabel + '</span>' +
                    '</div>' +
                    '<span class="t-status ' + t.statusClass + '">' + t.status + '</span>' +
                '</div>' +
                '<div class="t-subject">' + t.subject + '</div>' +
                '<div class="t-meta">' +
                    '<span class="t-updated">Updated: ' + t.updated + '</span>' +
                    '<span class="t-sys">' + t.system + '</span>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    // Sync timestamp
    document.getElementById('sync-label').textContent =
        'Synced ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    render();
</script>
</body>
</html>
